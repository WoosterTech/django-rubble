[tox]
requires =
    tox>=4.32.0
    tox-uv>=1.29.0
env_list =
    py311-django41
    py311-django42
    py312-django42
    py311-django50
    py312-django50
    py311-django51
    py312-django51
    py313-django51
    py311-django52
    py312-django52
    py313-django52
    ; py314-django52
    py312-django60
    py313-django60
    ; py314-django60
skip_missing_interpreters = true

[testenv]
description = Run pytest for a pinned Python x Django combination
runner = uv-venv-runner
package = wheel
dependency_groups =
    test
deps =
    django41: Django>=4.1,<4.2
    django42: Django>=4.2.8,<4.3
    django50: Django>=5.0,<5.1
    django51: Django>=5.1.3,<5.2
    django52: Django>=5.2.8,<5.3
    django60: Django>=6.0,<6.1
commands =
    python -m pytest {posargs}
